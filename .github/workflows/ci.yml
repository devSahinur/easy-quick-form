name: CI

# Lints, type-checks, tests and builds the workspace on every push and pull
# request to main, so broken code is caught before it merges.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: Lint, type-check, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is read from the "packageManager" field in package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared validation package
        run: pnpm --filter @form-builder/validation build

      - name: Type-check server
        run: pnpm --filter @form-builder/server exec tsc --noEmit

      - name: Lint client
        run: pnpm --filter @form-builder/client lint

      - name: Test server
        run: pnpm --filter @form-builder/server test

      - name: Test client
        run: pnpm --filter @form-builder/client test

      - name: Build client
        run: pnpm --filter @form-builder/client build
