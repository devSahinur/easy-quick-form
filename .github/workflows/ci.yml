name: CI

# Quality gate that runs before code reaches main. Vercel handles the actual
# deploys (via its Git integration); this just makes sure the code typechecks and
# builds so a broken commit can't be merged. See CICD.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is read from the "packageManager" field in package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared validation package
        run: pnpm --filter @form-builder/validation build

      - name: Typecheck server
        run: pnpm --filter @form-builder/server exec tsc --noEmit

      - name: Build client
        run: pnpm --filter @form-builder/client build

      # Lint is informational for now (set to fail the job by removing
      # continue-on-error once the codebase is warning-clean).
      - name: Lint client
        run: pnpm --filter @form-builder/client lint
        continue-on-error: true
